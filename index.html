<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>JoH Cosmetics</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="overlay">
    <h1>JoH Cosmetics💄</h1>
    <p>Premium Skincare & Makeup</p>
    <button onclick="showProducts()">VIEW</button>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="screen">

<!-- CART BADGE -->
<div id="cartBadge" onclick="openCheckout()">
🛒 <span id="cartCount">0</span>
</div>

<h2>Bidhaa 💖</h2>

<div id="productList"></div>

</div>

<!-- CART (HIDDEN PAGE OPTIONAL) -->
<div id="cart" class="screen"></div>
<!-- ADMIN LOGIN -->
<div id="adminLogin" class="screen">
  <h2>Admin Login</h2>
  <input id="adminPass" type="password" placeholder="Password">
  <button onclick="loginAdmin()">Login</button>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <h2>Welcome Faridi</h2>

  <input type="hidden" id="editId">

  <input id="name" placeholder="Jina la bidhaa">
  <input id="price" placeholder="Bei">
  <input id="image" placeholder="Image URL">

  <button onclick="saveProduct()">Hifadhi</button>
</div>

</div>

<!-- 🔥 CHECKOUT BOTTOM SHEET -->
<div id="checkoutSheet" class="checkout-sheet">

  <div class="sheet-header">
    <h3>🛒 Oda Yako</h3>
    <button onclick="closeCheckout()">✖</button>
  </div>

  <div id="checkoutList"></div>

  <div class="sheet-footer">

    <h3>Total: Tsh <span id="checkoutTotal">0</span></h3>

    <input id="cName" placeholder="Jina lako">
    <input id="cLocation" placeholder="Mahali">

    <button onclick="checkout()">Tuma Oda WhatsApp</button>

  </div>

</div>

<!-- NAV -->
<div class="navbar">
<button onclick="showHome()">Home</button>
<button onclick="goAdminLogin()">Admin</button>
</div>

<script src="script.js"></script>
</body>
</html>
